<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a878"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Candlestick bars (subtle, background layer) -->
  <g opacity="0.12" stroke="#00d4aa" stroke-width="6" stroke-linecap="round">
    <!-- bar 1 -->
    <line x1="100" y1="200" x2="100" y2="340"/>
    <rect x="88" y="230" width="24" height="60" rx="3" fill="#00d4aa" stroke="none"/>
    <!-- bar 2 -->
    <line x1="148" y1="170" x2="148" y2="310"/>
    <rect x="136" y="190" width="24" height="80" rx="3" fill="#00d4aa" stroke="none"/>
    <!-- bar 3 -->
    <line x1="196" y1="210" x2="196" y2="360"/>
    <rect x="184" y="240" width="24" height="70" rx="3" fill="#00d4aa" stroke="none"/>
    <!-- bar 4 -->
    <line x1="316" y1="160" x2="316" y2="300"/>
    <rect x="304" y="175" width="24" height="90" rx="3" fill="#00d4aa" stroke="none"/>
    <!-- bar 5 -->
    <line x1="364" y1="180" x2="364" y2="330"/>
    <rect x="352" y="200" width="24" height="85" rx="3" fill="#00d4aa" stroke="none"/>
    <!-- bar 6 -->
    <line x1="412" y1="150" x2="412" y2="290"/>
    <rect x="400" y="165" width="24" height="80" rx="3" fill="#00d4aa" stroke="none"/>
  </g>

  <!-- Tayra silhouette — stylized, low-polygon -->
  <!-- Body -->
  <ellipse cx="256" cy="295" rx="90" ry="44" fill="url(#accentGrad)" opacity="0.95"/>
  <!-- Head -->
  <ellipse cx="318" cy="258" rx="42" ry="34" fill="url(#accentGrad)" opacity="0.95"/>
  <!-- Snout -->
  <ellipse cx="348" cy="268" rx="20" ry="14" fill="url(#accentGrad)" opacity="0.95"/>
  <!-- Ear -->
  <polygon points="302,232 315,210 330,230" fill="url(#accentGrad)" opacity="0.95"/>
  <!-- Tail (long, curved via path) -->
  <path d="M172,300 Q130,280 115,240 Q105,210 125,205" stroke="url(#accentGrad)" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Legs -->
  <rect x="210" y="326" width="18" height="36" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="248" y="330" width="18" height="32" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="284" y="326" width="18" height="36" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
  <!-- Eye -->
  <circle cx="332" cy="256" r="5" fill="#0f0f1a"/>
  <circle cx="333" cy="255" r="2" fill="#ffffff" opacity="0.6"/>

  <!-- "tayrax" wordmark -->
  <text
    x="256"
    y="418"
    font-family="'Courier New', Courier, monospace"
    font-size="52"
    font-weight="700"
    letter-spacing="6"
    fill="url(#accentGrad)"
    text-anchor="middle"
    dominant-baseline="middle"
  >tayrax</text>

  <!-- Thin border glow -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#00d4aa" stroke-width="3" opacity="0.2"/>
</svg>
